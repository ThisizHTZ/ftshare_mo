:'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function fmt(n,d=2){n=Number(n);return Number.isFinite(n)?n.toLocaleString('zh-CN',{maximumFractionDigits:d,minimumFractionDigits:d}):'-'}function pct(n){return fmt(Number(n)*100,2)+'%'}function money(n){n=Number(n||0);if(Math.abs(n)>=1e8)return fmt(n/1e8,2)+'亿';if(Math.abs(n)>=1e4)return fmt(n/1e4,2)+'万';return fmt(n,0)}function cls(v){return Number(v)>=0?'pos':'neg'}function score(s){return Number(s.composite_score||0)+Number(s.resonance_score||0)-Number(s.risk_score||0)}function fStocks(){const q=state.query.trim().toLowerCase();return payload.stocks.filter(s=>(state.sector==='ALL'||s.sector===state.sector)&&state.labels.has(s.prediction_label||'中性')&&(!q||[s.symbol,s.name,s.sector,s.prediction_label].some(x=>String(x||'').toLowerCase().includes(q))))}function vStocks(){const m=new Map();for(const s of fStocks()){if(!m.has(s.sector))m.set(s.sector,[]);m.get(s.sector).push(s)}const out=[];for(const a of m.values()){a.sort((x,y)=>score(y)-score(x));out.push(...a.slice(0,state.topN))}return out}function hash01(s){let h=2166136261;for(let i=0;i<String(s).length;i++){h^=String(s).charCodeAt(i);h=Math.imul(h,16777619)}return ((h>>>0)%10000)/10000}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function extent(arr,fn){let mn=Infinity,mx=-Infinity;for(const x of arr){const v=Number(fn(x)||0);if(Number.isFinite(v)){mn=Math.min(mn,v);mx=Math.max(mx,v)}}if(!Number.isFinite(mn)||mn===mx)return[-1,1];return[mn,mx]}function norm(v,mn,mx){return (Number(v||0)-mn)/(mx-mn)*2-1}function graph(){const stocks=vStocks(),names=new Set(stocks.map(s=>s.sector)),secs=payload.sectors.filter(s=>names.has(s.name));const nodes=[{id:'index',type:'index',name:'中证1000',x:0,y:-360,r:22}],edges=[];const [chgMin,chgMax]=extent(stocks,s=>s.change_rate+0.55*s.interval_return);const [turnMin,turnMax]=extent(stocks,s=>Math.log1p(Math.max(0,Number(s.turnover_delta||0))));const [secMin,secMax]=extent(secs,s=>s.sector_score);const cols=Math.max(3,Math.ceil(Math.sqrt(Math.max(1,secs.length))*1.25));const cellW=260,cellH=210;secs.forEach((sec,i)=>{const col=i%cols,row=Math.floor(i/cols),gridX=(col-(cols-1)/2)*cellW,gridY=(row-Math.floor(secs.length/cols)/2)*cellH;const jitterX=(hash01(sec.name)-.5)*78,jitterY=(hash01(sec.name+'y')-.5)*70;const sx=gridX+jitterX,sy=gridY+jitterY;const sn={id:'sector:'+sec.name,type:'sector',name:sec.name,x:sx,y:sy,r:12+Math.min(13,Math.sqrt(sec.component_count||0)*1.8),data:sec};nodes.push(sn);edges.push({from:'index',to:sn.id,w:1.2+Math.min(4,Math.abs(norm(sec.sector_score,secMin,secMax))*2)});const kids=stocks.filter(s=>s.sector===sec.name).sort((x,y)=>score(y)-score(x));kids.forEach((st,j)=>{const signalX=norm(Number(st.change_rate||0)+.55*Number(st.interval_return||0),chgMin,chgMax);const heatY=norm(Math.log1p(Math.max(0,Number(st.turnover_delta||0))),turnMin,turnMax);const scatterX=(hash01(st.symbol)-.5)*82;const scatterY=(hash01(st.symbol+'v')-.5)*72;const rankPull=Math.max(0,1-j/Math.max(1,kids.length))*24;const x=sx+clamp(signalX,-1,1)*92+scatterX;const y=sy-clamp(heatY,-1,1)*76+scatterY-rankPull;nodes.push({id:'stock:'+st.symbol,type:'stock',name:st.name||st.symbol,x,y,r:5+Math.min(9,(Math.abs(st.composite_score||0)+Math.abs(st.resonance_score||0))*1.2),data:st});edges.push({from:sn.id,to:'stock:'+st.symbol,w:.7+Math.min(3,Math.abs(st.weight||0)*900)})})});return{nodes,edges,stocks,sectors:secs}}function fit(){state.scale=1;state.tx=svg.clientWidth/2;state.ty=svg.clientHeight/2}function sx(x){return x*state.scale+state.tx}function sy(y){return y*state.scale+state.ty}function nclass(n){if(n.type==='index')return'node-index';if(n.type==='sector')return'node-sector';const lab=n.data?.prediction_label||'';if(Number(n.data?.risk_score||0)>0||lab.includes('风险'))return'node-stock risk';if(Number(n.data?.resonance_score||0)>0||lab.includes('异动'))return'node-stock hot';return'node-stock'}function draw(g){const by=new Map(g.nodes.map(n=>[n.id,n]));function rel(id){return state.selected==='in
